<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lesson 1 - getElementById</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #f5f5f5;
    }

    h1 { color: #333; }

    #myBox {
      background: lightblue;
      padding: 20px;
      width: 300px;
      font-size: 20px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Lesson 1 — getElementById</h1>

  <!-- Yeh box hai jise hum JS se pakdenge -->
  <div id="myBox">
    Main ek box hoon 📦
  </div>

  <button onclick="textBadlo()">Text Badlo</button>
  <button onclick="colorBadlo()">Color Badlo</button>
  <button onclick="reset()">Reset</button>

  <hr>

  <!-- Yahan console jaisa output dikhayenge -->
  <h3>Console Output:</h3>
  <div id="output" style="background:black; color:lime; padding:15px; font-family:monospace; font-size:15px;">
    // Abhi kuch nahi hua...
  </div>

  <script>

    // STEP 1 — getElementById se element pakdo
    // document.getElementById('id-name') → woh element return karta hai

    function textBadlo() {

      // Box pakda
      let box = document.getElementById('myBox');

      // Text badla
      box.innerHTML = 'Text badal gaya! ✅';

      // Output mein dikhao
      let output = document.getElementById('output');
      output.innerHTML = `
        let box = document.getElementById('myBox'); <br>
        box.innerHTML = 'Text badal gaya!';
      `;
    }

    function colorBadlo() {

      let box = document.getElementById('myBox');

      // Style.background se background color badlo
      box.style.background = 'salmon';

      let output = document.getElementById('output');
      output.innerHTML = `
        let box = document.getElementById('myBox'); <br>
        box.style.background = 'salmon';
      `;
    }

    function reset() {

      let box = document.getElementById('myBox');
      box.innerHTML = 'Main ek box hoon 📦';
      box.style.background = 'lightblue';

      let output = document.getElementById('output');
      output.innerHTML = '// Reset ho gaya!';
    }

  </script>

</body>
</html>
