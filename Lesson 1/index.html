 <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lesson 1 - getElementById</title>
    <style>
      body {
        font-family: monospace;
        padding: 30px;
        background: #f5f5f5;
      }

      h1 {
        color: #333;
      }

      #myBox {
        background: lightblue;
        padding: 20px;
        width: 300px;
        font-size: 20px;
        margin-bottom: 20px;
      }

      button {
        padding: 10px 20px;
        margin: 5px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Lesson 1 — getElementById</h1>

    <!-- This is the box that we will select using JavaScript -->
    <div id="myBox">I am a box 📦</div>

    <button onclick="changeText()">Change Text</button>
    <button onclick="changeColor()">Change Color</button>
    <button onclick="resetBox()">Reset</button>

    <hr />

    <!-- Console-like output will be shown here -->
    <h3>Console Output:</h3>
    <div
      id="output"
      style="
        background: black;
        color: lime;
        padding: 15px;
        font-family: monospace;
        font-size: 15px;
      "
    >
      // Nothing has happened yet...
    </div>

    <script>
      // Step 1 - Select the element using getElementById
      // document.getElementById('id-name') --> returns that element

      function changeText() {
        // Select the box
        let box = document.getElementById("myBox");

        // Change the text
        box.innerHTML = "The text has been changed!";

        // Show it in the output
        let output = document.getElementById("output");
        output.innerHTML = `// selected the box
        <br>
        let box = document.getElementById('myBox')
        <br><br>
        // changed the text
        <br>
        box.innerHTML = 'The text has been changed!'
        `;
      }

      function changeColor() {
        // Select the box
        let box = document.getElementById("myBox");

        // Change the background color
        box.style.background = "green";
        box.innerHTML = "The color has been changed!";

        // Show it in the output
        let output = document.getElementById("output");
        output.innerHTML = `// selected the box
        <br>
        let box = document.getElementById('myBox')
        <br><br>
        // changed the background color
        <br>
        box.style.background = 'green'
        `;
      }

      function resetBox() {
        // Select the box
        let box = document.getElementById("myBox");

        // Reset everything
        box.innerHTML = "I am a box 📦";
        box.style.background = "lightblue";

        // Update the output
        let output = document.getElementById("output");
        output.innerHTML = "// Everything has been reset!";
      }
    </script>
  </body>
</html>
